<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Helpdesk Ticket Similarity</title>
<style>
  body { font-family: Arial, sans-serif; padding: 20px; }
  #logo { height: 80px; margin-bottom: 20px; }
  .ticket { border-bottom: 1px solid #ccc; padding: 10px 0; }
  .ticket:last-child { border-bottom: none; }
</style>
</head>
<body>

<img id="logo" src="path/to/your/helpdesk_logo.png" alt="Helpdesk Logo" />

<h1>Helpdesk Similar Ticket Finder</h1>

<form id="ticket-form">
  <label for="subject">Ticket Subject:</label><br>
  <input type="text" id="subject" name="subject" required /><br><br>

  <label for="content">Ticket Content:</label><br>
  <textarea id="content" name="content" rows="6" cols="50" required></textarea><br><br>

  <button type="submit">Find Similar Tickets</button>
</form>

<h2>Results:</h2>
<div id="results"></div>

<script>
document.getElementById('ticket-form').addEventListener('submit', function(e) {
  e.preventDefault();

  const subject = document.getElementById('subject').value;
  const content = document.getElementById('content').value;

  fetch('/search_similar', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({subject: subject, content: content})
  })
  .then(response => response.json())
  .then(data => {
    const resultsDiv = document.getElementById('results');
    resultsDiv.innerHTML = '';

    if (data.length === 0) {
      resultsDiv.innerHTML = '<p>No similar tickets found.</p>';
      return;
    }

    data.forEach(ticket => {
      const div = document.createElement('div');
      div.classList.add('ticket');
      div.innerHTML = `<strong>Ticket ID:</strong> ${ticket.id} <br/>
                       <strong>Subject:</strong> ${ticket.subject} <br/>
                       <strong>Distance:</strong> ${ticket.distance.toFixed(4)} <br/>
                       <strong>Content Preview:</strong> ${ticket.content.substring(0, 200)}...`;
      resultsDiv.appendChild(div);
    });
  })
  .catch(err => {
    console.error('Error:', err);
  });
});
</script>

</body>
</html>
